<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Clicker</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0b1e; color: #fff; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; overflow: hidden; }
        #starfield { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.5; }
        .hyper { border-radius: 10px !important; animation: hd 0.4s linear infinite !important; }
        @keyframes hd { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }
        .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; padding: 40px 20px; width: 100%; max-width: 400px; text-align: center; }
        #score { font-size: 3.2rem; font-weight: bold; margin: 5px 0; color: #00fff2; text-shadow: 0 0 15px rgba(0,255,242,0.4); }
        .coin-btn { width: 160px; height: 160px; border-radius: 50%; border: none; cursor: pointer; font-size: 4.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px #00fff2; transition: transform 0.05s; margin: auto 0; }
        .coin-btn:active { transform: scale(0.9); }
        .shop-panel { position: fixed; bottom: -100%; left: 0; right: 0; background: #0f0f2d; border-top: 3px solid #00fff2; border-radius: 20px 20px 0 0; padding: 20px; transition: bottom 0.3s ease; z-index: 1000; max-height: 60vh; display: flex; flex-direction: column; }
        .shop-panel.open { bottom: 0; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,255,0.2); color: #8a8ab0; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: rgba(0,255,242,0.15); border-color: #00fff2; color: #00fff2; }
        .tab-content { display: none; flex-direction: column; gap: 8px; overflow-y: auto; margin-top: 10px; }
        .tab-content.active { display: flex; }
        .shop-item { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0,255,255,0.2); color: #fff; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .shop-item:disabled { opacity: 0.3; }
        #chest { position: fixed; font-size: 2.5rem; cursor: pointer; z-index: 98; display: none; }
        .modal { position: fixed; inset: 0; background: rgba(5,5,20,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        #audio-blocker { position: fixed; inset: 0; background: #0b0b1e; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #start-audio-btn { padding: 15px 30px; font-size: 1.2rem; background: #00fff2; border: none; font-weight: bold; border-radius: 50px; box-shadow: 0 0 20px #00fff2; margin-top: 20px; color: #000; }
        .floating-text { position: fixed; pointer-events: none; font-weight: bold; font-size: 1.5rem; animation: fu 0.5s ease-out forwards; z-index: 9999; }
        @keyframes fu { 0% { transform: translate(-50%, -50%); opacity: 1; } 100% { transform: translate(-50%, -80px); opacity: 0; } }
    </style>
    <link id="favicon" rel="icon" href='data:image/svg+xml,<svg xmlns="http://w3.org" viewBox="0 0 100 100"><text y=".9em" font-size="90">🪙</text></svg>'>
</head>
<body>

    <div id="audio-blocker">
        <h2 style="color:#00fff2; text-align:center;">БОРТОВОЙ КОМПЬЮТЕР ШАТТЛА</h2>
        <p style="color:#8a8ab0; text-align:center;">Нажмите для активации аудиосистем мобильного устройства</p>
        <button id="start-audio-btn">ЗАПУСТИТЬ ИГРУ 🚀</button>
    </div>

    <audio id="bgMusic" loop playsinline>
        <source src="https://zvukipro.com/uploads/files/2020-01/1579548242_valcos-a-new-light.mp3" type="audio/mpeg">
    </audio>
    <div id="starfield"></div>
    <div id="chest">🎁</div>

    <div class="modal" id="quizModal">
        <div style="background:#0f0f32; border:2px solid #ff00ff; box-shadow:0 0 20px #ff00ff; padding:25px; border-radius:16px; text-align:center; width:280px;">
            <h3 style="color:#ff00ff; margin:0;">Взлом сундука! (<span id="timer" style="color:#ff0055;">10</span>с)</h3>
            <div id="task" style="font-size:1.8rem; font-weight:bold; margin:15px 0; color:#00fff2;">5 + 5</div>
            <input type="number" id="ansInput" style="width:100%; padding:8px; text-align:center; background:#000; border:1px solid #00fff2; color:#fff; font-size:1.2rem; border-radius:6px; outline:none;"><br><br>
            <button id="submitAns" style="background:#ff00ff; border:none; color:#fff; padding:10px; font-weight:bold; border-radius:6px; width:100%;">ОТКРЫТЬ</button>
        </div>
    </div>

    <div class="shop-panel" id="shopPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0; color:#00fff2;">🛒 Магазин Шаттла</h3>
            <button id="closeShopBtn" style="background:none; border:none; color:#ff0055; font-size:1.5rem; font-weight:bold;">✕</button>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:5px;">
            <button class="tab-btn active" id="tabUpgradesBtn">⚡ АПГРЕЙДЫ</button>
            <button class="tab-btn" id="tabSkinsBtn">🎨 СКИНЫ</button>
        </div>
        <div class="tab-content active" id="tabUpgrades">
            <button class="shop-item" id="buyClick"><span>Сила клика (+1)</span> <b id="costClick">50</b></button>
            <button class="shop-item" id="buyAuto"><span>Автоклик (+1/с)</span> <b id="costAuto">100</b></button>
            <button class="shop-item" id="buyShip"><span>🚀 Корабль (+100/с)</span> <b id="costShip">5000</b></button>
            <button class="shop-item" id="buyGen"><span>⚛️ Генератор (+250)</span> <b id="costGen">50000</b></button>
            <button class="shop-item" id="buyHole"><span>🕳️ Черная дыра (+15к)</span> <b id="costHole">500000</b></button>
        </div>
        <div class="tab-content" id="tabSkins">
            <button class="shop-item" id="skin1"><span>🪙 Базовый скин</span> <b>Выбрано</b></button>
            <button class="shop-item" id="skin2"><span>☀️ Плазменная звезда</span> <b id="costSkin2">100000</b></button>
            <button class="shop-item" id="skin3"><span>🌀 Антиматерия</span> <b id="costSkin3">500000</b></button>
        </div>
    </div>

    <div class="container">
        <div>
            <div id="rank" style="color:#ffd700; font-weight:bold;">Космический странник</div>
            <div style="color:#ffd700; font-size:0.85rem;">Престиж Ур. <span id="prestigeLevel">0</span> (x<span id="multiplier">1</span>)</div>
            <div id="score">0</div>
            <div class="stats-info">В секунду: +<span id="pps">0</span> | Клик: +<span id="cpc">1</span></div>
        </div>

        <button class="coin-btn" id="coinBtn">🪙</button>
        <div id="info-box"></div>

        <div style="width:100%; display:flex; flex-direction:column; gap:10px;">
            <button id="prestigeBtn" disabled style="padding:10px; background:transparent; border:1px solid #ffd700; color:#ffd700; border-radius:10px; font-weight:bold;">🌌 Перерождение (Цена: 1М)</button>
            <button id="openShopBtn" style="padding:12px; background:rgba(0,255,242,0.1); border:2px solid #00fff2; color:#00fff2; font-weight:bold; border-radius:50px; box-shadow:0 0 10px rgba(0,255,242,0.2);">🛒 МАГАЗИН УЛУЧШЕНИЙ</button>
        </div>
    </div>

    <script>
        let score = 0; let totalClicks = 0; let clickPower = 1;
        let autoClickers = 0; let ships = 0; let generators = 0; let blackHoles = 0; let prestige = 0;
        let costClick = 50; let costAuto = 100; let costShip = 5000; let costGen = 50000; let costHole = 500000;
        let hasSkin2 = false; let hasSkin3 = false; let currentSkin = '🪙';
        let easterEggTriggered = false; let quantumActive = false; let audioCtx = null; let musicPlaying = false;

        const colors = {
            0: { coin: 'radial-gradient(circle, #00fff2, #00b8ff)', shadow: '0 0 25px #00fff2', text: '#00fff2' },
            1: { coin: 'radial-gradient(circle, #ff0055, #b3003b)', shadow: '0 0 25px #ff0055', text: '#ff0055' },
            2: { coin: 'radial-gradient(circle, #aa00ff, #660099)', shadow: '0 0 25px #aa00ff', text: '#aa00ff' }
        };

        function getMultiplier() { return Math.max(1, prestige * 5); }
        function getIncome() { return (autoClickers * 1 + ships * 100 + blackHoles * 15000) * getMultiplier(); }
        function getClickValue() { return (quantumActive ? clickPower * 10 : clickPower) * getMultiplier(); }

        function updateRank() {
            let r = "Космический странник";
            if (score >= 10000) r = "Капитан шаттла";
            if (score >= 100000) r = "Исследователь пустоты";
            if (score >= 1000000 || prestige > 0) r = "Лорд Галактики";
            if (prestige >= 2) r = "Повелитель Вселенной";
            document.getElementById('rank').textContent = r;
        }

        const sf = document.getElementById('starfield');
        for(let i=0; i<30; i++) {
            let s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = Math.random() * 3 + 1 + 'px';
            s.style.left = Math.random() * 100 + 'vw'; s.style.top = Math.random() * 100 + 'vh';
            sf.appendChild(s);
        }
      else { m.pause(); document.getElementById('musicToggle').textContent = "🔇"; }
    };

    let ct; let ra = 0; const ce = document.getElementById('chest');
    
    // Появление сундука раз в 120 секунд
    setInterval(() => { 
        ce.style.display = 'block'; 
        ce.style.left = Math.random() * 70 + 15 + 'vw'; 
        ce.style.top = Math.random() * 50 + 25 + 'vh'; 
    }, 120000);

    // Клик по сундуку
    ce.onclick = () => {
        ce.style.display = 'none'; 
        let n1 = Math.floor(Math.random() * 20) + 5; 
        let n2 = Math.floor(Math.random() * 15) + 2;
        ra = n1 + n2; 
        document.getElementById('task').textContent = n1 + " + " + n2 + " = ?";
        let tl = 10; 
        document.getElementById('timer').textContent = tl; 
        document.getElementById('quizModal').style.display = 'flex';
        
        clearInterval(ct);
        ct = setInterval(() => { 
            tl--; 
            document.getElementById('timer').textContent = tl; 
            if(tl <= 0) { 
                clearInterval(ct); 
                document.getElementById('quizModal').style.display = 'none'; 
            } 
        }, 1000);
    };

    // Проверка ответа
    document.getElementById('submitAns').onclick = () => {
        clearInterval(ct); 
        document.getElementById('quizModal').style.display = 'none';
        if(parseInt(document.getElementById('ansInput').value) === ra) {
            if(Math.random() > 0.5) { 
                let b = Math.max(500, getIncome() * 50); 
                score += b; 
                document.getElementById('info-box').textContent = "+" + b + " очков!"; 
            } else { 
                quantumActive = true; 
                document.getElementById('info-box').textContent = "КВАНТОВЫЙ ВЗРЫВ! Клик x10!"; 
                document.querySelectorAll('.star').forEach(s => s.classList.add('hyper')); 
                setTimeout(() => { 
                    quantumActive = false; 
                    document.querySelectorAll('.star').forEach(s => s.classList.remove('hyper')); 
                    updateUI(); 
                }, 15000); 
            }
        } else { 
            document.getElementById('info-box').textContent = "Взлом провален!"; 
        }
        updateUI(); 
        saveGame();
    };

    // Загрузка сейвов
    function loadGame() {
        const saved = localStorage.getItem('spaceVibeMobiFinalV3');
        if (saved) {
            const d = JSON.parse(saved); 
            score = d.score || 0; 
            totalClicks = d.totalClicks || 0; 
            clickPower = d.clickPower || 1;
            autoClickers = d.autoClickers || 0; 
            ships = d.ships || 0; 
            generators = d.generators || 0; 
            blackHoles = d.blackHoles || 0; 
            prestige = d.prestige || 0;
            costClick = d.costClick || 50; 
            costAuto = d.costAuto || 100; 
            costShip = d.costShip || 5000; 
            costGen = d.costGen || 50000; 
            costHole = d.costHole || 500000;
            hasSkin2 = d.hasSkin2 || false; 
            hasSkin3 = d.hasSkin3 || false; 
            currentSkin = d.currentSkin || '🪙'; 
            easterEggTriggered = d.easterEggTriggered || false;
        }
        updateUI();
    }

    // Сохранение прогресса
    function saveGame() {
        const d = { score, totalClicks, clickPower, autoClickers, ships, generators, blackHoles, prestige, costClick, costAuto, costShip, costGen, costHole, hasSkin2, hasSkin3, currentSkin, easterEggTriggered };
        localStorage.setItem('spaceVibeMobiFinalV3', JSON.stringify(d));
    }

    // Таймер автодохода
    setInterval(() => { score += getIncome() / 10; updateUI(); }, 100);
    loadGame();

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
